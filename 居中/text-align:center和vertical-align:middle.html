<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outter {
            height: 500px;
            width: 500px;
            background-color: black;
            margin-left: 600px;
            margin-top: 250px;
            /* position: relative; */
            text-align: center;
        }


        .outter::after {
            content: '';
            height: 100%;
            display: inline-block;
            vertical-align: middle;
        }

        .inner {
            width: 250px;
            height: 250px;
            background-color: gray;
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="outter">
        <div class="inner">hello world</div>
    </div>
</body>

</html>
