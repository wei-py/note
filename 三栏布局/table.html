<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #app {
            display: table;
            height: 900px;
            width: 100%;
            background-color: #aaa;
        }
        #app > div {
            display: table-cell;
        }
        #left {
            width: 300px;
            height: auto;
            background-color: pink;
        }
        #middle {
            height: auto;
            background-color: skyblue;
        }
        #right {
            height: auto;
            width: 300px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="left"></div>
        <div id="middle"></div>
        <div id="right"></div>
    </div>
</body>
</html>
