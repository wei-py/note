<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #contain {
            height: 100px;
            width: 100px;
            left: 600px;
            top: 250px;
            position: relative;
            background-color: black;
            animation: myfirst 5s 2 linear alternate both;
            /* animation: 3s linear 1s infinite alternate slidein; */
            animation-delay: 2s;
        }

        /* @keyframes myfirst {
            from {
                background-color: blanchedalmond;
            }

            to {
                background-color: cornflowerblue;
            }
        } */
        @keyframes myfirst {
            0% {
                background-color: crimson;
                left: 600px;
                top: 250px;
            }

            25% {
                background-color: yellow;
                left: 700px;
                top: 250px;
            }

            50% {
                background-color: green;
                left: 700px;
                top: 350px;
            }

            75% {
                background-color: yellow;
                left: 600px;
                top: 350px;
            }

            100% {
                background-color: red;
                left: 600px;
                top: 250px;
            }
        }
    </style>
</head>

<body>
    <div id="contain"></div>
</body>

</html>
